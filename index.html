<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>ARC Chatbot</h1>
      <p>Your simple ARC assistant</p>
    </header>

    <main class="chat-container">
      <div id="chat-box" class="chat-box">
        <div class="message bot">
          <div class="bubble">
            Hello 👋 I am your ARC assistant. Ask me about ARC, bridge, staking, wallets, or official links.
          </div>
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Ask something about ARC..."
        />
        <button id="send-btn">Send</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
